function drawSprite(key, x, y, w, h) {

const _sheetCache = {};
function preloadSheets() {
  for (const k in SHEETS) { const s = SHEETS[k]; const img = new Image(); img.src = s.src; img.onload = () => { _sheetCache[k] = img; }; }
}
function drawSheetFrame(key, row, frame, cx, cy, targetH, flipOverride) {
  const s = SHEETS[key], img = _sheetCache[key]; if (!img) return false;
  const fw = img.width / s.cols, fh = img.height / s.rows;
  const dh = targetH, dw = dh * fw / fh;
  const doFlip = (flipOverride === undefined) ? s.flip : flipOverride;
  if (doFlip) {
    ctx.save(); ctx.translate(cx, 0); ctx.scale(-1, 1);
    ctx.drawImage(img, frame * fw, row * fh, fw, fh, -dw / 2, cy - dh * 0.6, dw, dh);
    ctx.restore();
  } else {
    ctx.drawImage(img, frame * fw, row * fh, fw, fh, cx - dw / 2, cy - dh * 0.6, dw, dh);

}
// 每一格圖框中「實際人物」的去背邊界(正規化 0~1)，用來把不同姿勢縮放成相同人物大小
const FRAME_BOUNDS = {

    [0.2308,0.1207,0.7130,0.8241],[0.2544,0.0000,0.7041,0.8241],[0.2219,0.1207,0.6982,0.8241],[0.1657,0.1034,0.7367,0.8241],
    [0.2160,0.0828,0.7367,0.6931],[0.1479,0.2483,0.8136,0.6897],[0.1805,0.1207,0.8580,0.6793],[0.3314,0.0345,0.6420,0.6103],
  ],
};
// 依「人物實高」縮放：不論勝利/落敗姿勢，角色高度都等於 charH，腳底對齊 baseY
function drawCharFit(key, row, frame, cx, baseY, charH, faceLeft) {
  const s = SHEETS[key], img = _sheetCache[key], tbl = FRAME_BOUNDS[key];
  if (!img || !tbl) return false;
  const b = tbl[row * s.cols + frame];
  const fw = img.width / s.cols, fh = img.height / s.rows;
  const sx = (frame + b[0]) * fw, sy = row * fh + b[1] * fh;
  const sw = (b[2] - b[0]) * fw, shp = (b[3] - b[1]) * fh;
  const dh = charH, dw = sw * (charH / shp), dy = baseY - dh;
  if (faceLeft) {
    ctx.save(); ctx.translate(cx, 0); ctx.scale(-1, 1);
    ctx.drawImage(img, sx, sy, sw, shp, -dw / 2, dy, dw, dh); ctx.restore();
  } else {
    ctx.drawImage(img, sx, sy, sw, shp, cx - dw / 2, dy, dw, dh);
  }
  return true;
}
// 用士兵圖示表示累計勝場
function drawWinTally(cy, iconH, fontPx) {
  ctx.textBaseline = "middle";
  const frame = Math.floor(gClock * 6) % 4;

    const tw = ctx.measureText(label).width, iconW = iconH * 0.8, gap = 6;
    const x = gx - (iconW + gap + tw) / 2;
    if (_sheetCache[sheet]) drawSheetFrame(sheet, ANIM.victory, frame, x + iconW / 2, cy + iconH * 0.18, iconH);
    else { ctx.fillStyle = sheet === "blue" ? "#3b73e6" : "#e6504a"; ctx.fillRect(x, cy - iconH / 2, iconW, iconH); }
    ctx.fillStyle = color; ctx.textAlign = "left";
    ctx.fillText(label, x + iconW + gap, cy);
  };
  grp("blue", "藍軍 " + state.wins[SIDE.LEFT] + " 勝", "#9fd0ff", W * 0.34);
  grp("red",  "紅軍 " + state.wins[SIDE.RIGHT] + " 勝", "#ff9a9a", W * 0.66);
  ctx.textBaseline = "alphabetic";
}

const CONFIG = {

const PRIZES = [

  { key: "coin",  name: "+100 金幣", short: "+100金", weight: 25 },

const PATH_WP = [[0.03,0.544],[0.101,0.518],[0.183,0.459],[0.265,0.43],[0.363,0.484],[0.461,0.519],[0.543,0.533],[0.625,0.494],[0.723,0.431],[0.805,0.469],[0.886,0.526],[0.985,0.544]];
const TREES_N = [[0.14,0.18],[0.23,0.86],[0.40,0.20],[0.58,0.86],[0.74,0.86],[0.86,0.20],[0.93,0.80],[0.34,0.90],[0.52,0.14],[0.67,0.86]];

const SIDE = { LEFT: 0, RIGHT: 1 };
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
let W = 0, H = 0, DPR = 1, layout = {}, state = null, gClock = 0;
let _slowmo = 0, _flashT = 0, _flashDur = 0; // 大軍登場：慢動作 + 全螢幕閃光
function triggerJackpotFx() { _slowmo = 1.0; _flashDur = 0.6; _flashT = _flashDur; }
function drawJackpotFlash() {
  const k = _flashT / _flashDur;          // 1 → 0
  const a = Math.min(1, k * 1.7);
  ctx.save();
  const g = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * 0.75);
  g.addColorStop(0, "rgba(255,255,255," + (0.85 * a) + ")");
  g.addColorStop(0.5, "rgba(255,225,150," + (0.5 * a) + ")");
  g.addColorStop(1, "rgba(255,200,90,0)");
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  ctx.globalAlpha = 0.6 * a; ctx.strokeStyle = "#ffd34d"; ctx.lineWidth = 18 * a;
  ctx.strokeRect(9, 9, W - 18, H - 18);
  ctx.restore();
}

let audioCtx = null, muted = false, _lastClash = 0, _lastHit = 0;
function initAudio() {
  if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
  if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
}
function tone(freq, dur, type, vol, when, slideTo) {
  if (!audioCtx || muted) return;
  const t0 = audioCtx.currentTime + (when || 0);
  const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
  osc.type = type || "sine"; osc.frequency.setValueAtTime(freq, t0);
  if (slideTo) osc.frequency.exponentialRampToValueAtTime(slideTo, t0 + dur);
  g.gain.setValueAtTime(0.0001, t0); g.gain.exponentialRampToValueAtTime(vol || 0.2, t0 + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  osc.connect(g).connect(audioCtx.destination); osc.start(t0); osc.stop(t0 + dur + 0.02);
}
const SFX = {
  correct() { tone(660, 0.12, "triangle", 0.25); tone(880, 0.16, "triangle", 0.22, 0.10); },
  wrong()   { tone(220, 0.25, "sawtooth", 0.20, 0, 110); },
  big()     { tone(150, 0.32, "sawtooth", 0.30, 0, 80); tone(300, 0.30, "square", 0.16, 0.05); tone(110, 0.45, "sine", 0.26, 0.12); },
  heal()    { tone(520, 0.12, "sine", 0.20); tone(780, 0.15, "sine", 0.18, 0.08); tone(1040, 0.18, "sine", 0.15, 0.16); },
  clash()   { const n = performance.now(); if (n - _lastClash < 70) return; _lastClash = n; tone(320, 0.06, "square", 0.12, 0, 180); },
  hit()     { const n = performance.now(); if (n - _lastHit < 70) return; _lastHit = n; tone(90, 0.18, "sawtooth", 0.26, 0, 50); },
  win()     { [523, 659, 784, 1047].forEach((f, i) => tone(f, 0.20, "triangle", 0.25, i * 0.12)); },
  tick()    { tone(880, 0.03, "square", 0.07); },
  jackpot() { [523, 659, 784, 1047, 1319].forEach((f, i) => tone(f, 0.20, "triangle", 0.25, i * 0.10)); },
};

// ===== 背景音樂（標題 title / 對戰 game / 勝利 win，自動切換循環）=====
const MUSIC = {};
let curMusic = null;
const _musicVol = { title: 0.35, game: 0.32, win: 0.45 };
function initMusic() {
  if (typeof Audio === "undefined") return;
  for (const k of ["title", "game", "win"]) {
    const a = new Audio(k + ".ogg"); a.loop = true; a.preload = "auto"; a.volume = _musicVol[k]; MUSIC[k] = a;
  }
}
// 每段音樂的音量拉軸（HTML 控制面板）
function setupVolumeUI() {
  const panel = document.getElementById("volPanel"), toggle = document.getElementById("volToggle");
  if (!panel || !toggle) return;
  toggle.addEventListener("click", () => panel.classList.toggle("open"));
  const labels = { title: "標題", game: "對戰", win: "勝利" };
  for (const k in labels) {
    const sl = document.getElementById("vol_" + k), val = document.getElementById("val_" + k);
    if (!sl) continue;
    sl.value = Math.round(_musicVol[k] * 100); val.textContent = sl.value + "%";
    sl.addEventListener("input", () => {
      const v = sl.value / 100; _musicVol[k] = v;
      if (MUSIC[k]) MUSIC[k].volume = v; val.textContent = sl.value + "%";
    });
  }
}
function musicForScreen(scr) { return scr === "MENU" ? "title" : scr === "RESULT" ? "win" : "game"; }
function pauseAllMusic() { for (const k in MUSIC) MUSIC[k].pause(); }
function syncMusic() {
  if (!state || !MUSIC.title) return;
  const want = musicForScreen(state.screen);
  if (want !== curMusic) {
    for (const k in MUSIC) if (k !== want) MUSIC[k].pause();
    curMusic = want;
    if (!muted) { try { MUSIC[want].currentTime = 0; } catch (e) {} const pr = MUSIC[want].play(); if (pr && pr.catch) pr.catch(() => {}); }
  } else if (!muted && MUSIC[want].paused) {
    const pr = MUSIC[want].play(); if (pr && pr.catch) pr.catch(() => {});
  }
}

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  canvas.style.width = W + "px"; canvas.style.height = H + "px";
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  computeLayout();
}
function computeLayout() {
  const panelsY = H * 0.46;
  layout.panels = {
    [SIDE.LEFT]:  { x: 0,     y: panelsY, w: W / 2, h: H - panelsY },
    [SIDE.RIGHT]: { x: W / 2, y: panelsY, w: W / 2, h: H - panelsY },
  };
  layout.field = { x: W * 0.015, y: H * 0.05, w: W * 0.97, h: panelsY - H * 0.05 - 4 };
  layout.path = buildPath(layout.field);
  computeCastleLayout();
  if (state && state.screen === "BATTLE") { layoutOptions(SIDE.LEFT); layoutOptions(SIDE.RIGHT); }
}
function computeCastleLayout() {
  const th = Math.min(128, H * 0.21), aspect = 1.5, tw = th * aspect;
  layout.castle = {}; layout.spawnProg = {};
  for (const side of [SIDE.LEFT, SIDE.RIGHT]) {
    const ep = layout.path.posAt(side === SIDE.LEFT ? 0 : 1);
    const cx = Math.max(tw / 2 + 6, Math.min(W - tw / 2 - 6, ep[0]));
    const gateX = side === SIDE.LEFT ? cx + tw * 0.18 : cx - tw * 0.18;   // 面向戰場的城門口
    layout.castle[side] = { cx, tw, th, topY: ep[1] - th * 0.72, baseY: ep[1], gateX };
  }
  layout.spawnProg[SIDE.LEFT] = 0;    // 從自家城堡（路徑端點）出發，左右對稱
  layout.spawnProg[SIDE.RIGHT] = 1;
}
function buildPath(rect) {
  const wp = PATH_WP.map(p => [rect.x + p[0] * rect.w, rect.y + p[1] * rect.h]);
  function cm(p0,p1,p2,p3,t){ const t2=t*t,t3=t2*t; return [
    0.5*((2*p1[0])+(-p0[0]+p2[0])*t+(2*p0[0]-5*p1[0]+4*p2[0]-p3[0])*t2+(-p0[0]+3*p1[0]-3*p2[0]+p3[0])*t3),
    0.5*((2*p1[1])+(-p0[1]+p2[1])*t+(2*p0[1]-5*p1[1]+4*p2[1]-p3[1])*t2+(-p0[1]+3*p1[1]-3*p2[1]+p3[1])*t3)]; }
  const samp=[];
  for(let i=0;i<wp.length-1;i++){ const p0=wp[i-1]||wp[i],p1=wp[i],p2=wp[i+1],p3=wp[i+2]||wp[i+1];
    for(let s=0;s<44;s++) samp.push(cm(p0,p1,p2,p3,s/44)); }
  samp.push(wp[wp.length-1]);
  const cum=[0];
  for(let i=1;i<samp.length;i++){ const dx=samp[i][0]-samp[i-1][0],dy=samp[i][1]-samp[i-1][1]; cum.push(cum[i-1]+Math.hypot(dx,dy)); }
  const total=cum[cum.length-1];
  return { samp, total, posAt(t){ const d=Math.max(0,Math.min(1,t))*total; let lo=0,hi=cum.length-1;
    while(lo<hi){ const m=(lo+hi)>>1; if(cum[m]<d) lo=m+1; else hi=m; }
    const i=Math.max(1,lo); const seg=cum[i]-cum[i-1]||1,f=(d-cum[i-1])/seg;
    return [samp[i-1][0]+(samp[i][0]-samp[i-1][0])*f, samp[i-1][1]+(samp[i][1]-samp[i-1][1])*f]; } };
}

function layoutOptions(side) {
  const p = layout.panels[side];
  const panel = state.battle.panels[side];
  const pad = Math.min(16, p.w * 0.026);

function buildOptionRects(side) {

  if (n <= 2) {

function initState() {
  state = { screen: "MENU", bankKey: null, menuButtons: [], battle: null, resultButtons: [], winner: null, muteBtn: null,
    wins: { [SIDE.LEFT]: 0, [SIDE.RIGHT]: 0 },

// 題庫正規化：未標 subject/grade 的舊題庫一律歸到「社會 三年級」
function getBanks() {
  const raw = window.QUESTION_BANKS || [];
  return raw.map(b => ({ ...b, subject: b.subject || "社會", grade: (b.grade == null ? 3 : Number(b.grade)) }))
            .filter(b => b.enabled !== false); // 只顯示「啟用」的題庫
}
const SUBJECT_ORDER = ["國語", "英語", "數學", "社會", "自然", "其他"];
function gradeLabel(g){ return Number(g) === 0 ? "不分年級" : (g + " 年級"); }
// 只回傳「有題庫」的科目（依固定順序）
function subjectsWithBanks() {
  const have = new Set(getBanks().map(b => b.subject));
  return SUBJECT_ORDER.filter(s => have.has(s));
}
// 某科目中「有題庫」的年級（由小到大）
function gradesForSubject(subj) {
  const gs = new Set(getBanks().filter(b => b.subject === subj).map(b => b.grade));

// 固定大小的按鈕格狀排版（不夠寬就自動換行）
function layoutMenuGrid(n, startY) {
  const bw = Math.min(260, W * 0.28), bh = 74, gapX = 24, gapY = 18;
  const perRow = Math.max(1, Math.min(n, Math.floor((W * 0.94 + gapX) / (bw + gapX))));
  const out = [];
  for (let i = 0; i < n; i++) {
    const row = Math.floor(i / perRow), col = i % perRow;
    const inRow = Math.min(perRow, n - row * perRow);
    const totalW = inRow * bw + (inRow - 1) * gapX, sx = (W - totalW) / 2;
    out.push({ x: sx + col * (bw + gapX), y: startY + row * (bh + gapY), w: bw, h: bh });
  }
  return out;
}
function startBattle(bankKey) {

function handlePoint(x, y) {

function pointInRect(x, y, r) { return r && x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

function handleResult(x, y) { for (const b of state.resultButtons) if (pointInRect(x, y, b)) { b.action(); return; } }
function handleBattle(x, y) {

    const p = layout.panels[side];
    if (x < p.x || x > p.x + p.w || y < p.y || y > p.y + p.h) continue;
    const panel = state.battle.panels[side];
    if (panel.lottery) return;
    if (pointInRect(x, y, panel.btnBig))     { tryAction(side, "big");  return; }
    if (pointInRect(x, y, panel.btnLottery)) { tryLottery(side);        return; }
    if (pointInRect(x, y, panel.btnHeal))    { tryAction(side, "heal"); return; }
    if (panel.cooldown > 0) return;

}
function submitAnswer(side, idx) {

    const dtSec = (performance.now() - (panel.qShownAt || performance.now())) / 1000;
    if (dtSec < st.fastest) st.fastest = dtSec;
    // 永久紀錄（跟勝場數一樣一直保留）
    const rec = state.records;
    if (st.streak > rec.bestStreak[side]) rec.bestStreak[side] = st.streak;
    if (dtSec < rec.fastest[side]) rec.fastest[side] = dtSec;
  } else {

function spawnArmy(side, tier, progOffset) {

function tryAction(side, kind) {

function weightedPick(pool) { const tot = pool.reduce((s, p) => s + p.weight, 0); let r = Math.random() * tot;
  for (const p of pool) { if ((r -= p.weight) <= 0) return p; } return pool[pool.length - 1]; }
function pickPrize(side) {

    if (lot.t - lot.lastSwitch >= interval) { lot.lastSwitch = lot.t; lot.shown = PRIZES[(Math.random() * PRIZES.length) | 0].short; SFX.tick(); }
  } else if (!lot.applied) {

    if (lot.result.key === "boss") { SFX.jackpot(); triggerJackpotFx(); } else SFX.win();

function update(dt) {
  if (state.screen !== "BATTLE") return;
  const b = state.battle;
  for (const side of [SIDE.LEFT, SIDE.RIGHT]) {
    const p = b.panels[side];
    if (p.cooldown > 0) p.cooldown = Math.max(0, p.cooldown - dt);
    if (p.flash > 0)    p.flash = Math.max(0, p.flash - dt);
    updateLottery(side, dt);
  }
  for (const u of b.units) { u.animT += dt; if (u.state === "walk") u.prog += (u.side === SIDE.LEFT ? 1 : -1) * u.speed * dt; }
  // 對立單位靠近 → 進入交戰（雙方停下互打）
  for (let i = 0; i < b.units.length; i++) {
    const a = b.units[i]; if (a.state !== "walk" || a.side !== SIDE.LEFT) continue;
    let best = null, bd = 1e9;
    for (let j = 0; j < b.units.length; j++) {
      const c = b.units[j]; if (c.state !== "walk" || c.side !== SIDE.RIGHT) continue;
      const d = Math.abs(a.prog - c.prog); if (d <= CONFIG.ENGAGE_PROG && d < bd) { bd = d; best = c; }
    }
    if (best) {
      a.state = "fight"; a.timer = CONFIG.FIGHT_DURATION; a.foe = best;
      best.state = "fight"; best.timer = CONFIG.FIGHT_DURATION; best.foe = a;
      const p = layout.path.posAt((a.prog + best.prog) / 2); addEffect("fx_clash", p[0], p[1]);
    }
  }
  // 行走中單位抵達敵方城門 → 攻打城堡
  for (const u of b.units) {
    if (u.state !== "walk") continue;
    const ux = layout.path.posAt(u.prog)[0];
    if (u.side === SIDE.LEFT && ux >= layout.castle[SIDE.RIGHT].gateX) startAttack(u, SIDE.RIGHT);
    else if (u.side === SIDE.RIGHT && ux <= layout.castle[SIDE.LEFT].gateX) startAttack(u, SIDE.LEFT);
  }
  // 狀態計時：交戰結算 / 攻擊完成 / 倒下移除
  for (const u of b.units) {
    if (u.state === "fight") {
      u.timer -= dt;
      if (u.timer <= 0) {
        const foe = u.foe;
        if (foe && foe.foe === u && foe.state === "fight") {
          const dmg = Math.min(u.strength, foe.strength); u.strength -= dmg; foe.strength -= dmg;
          for (const x of [u, foe]) {
            if (x.strength <= 0) { x.state = "die"; x.timer = CONFIG.DIE_DURATION; x.foe = null; }
            else { x.state = "walk"; x.foe = null; }
          }
          const p = layout.path.posAt((u.prog + foe.prog) / 2); addEffect("fx_clash", p[0], p[1]);
        } else { u.state = "walk"; u.foe = null; }
      }
    } else if (u.state === "attack") { u.timer -= dt; if (u.timer <= 0) u.dead = true; }
    else if (u.state === "die") { u.timer -= dt; if (u.timer <= 0) u.dead = true; }
  }
  b.units = b.units.filter(u => !u.dead);
  for (const e of b.effects) e.t += dt;

}

  if (c.hp === 0) { state.winner = side === SIDE.LEFT ? SIDE.RIGHT : SIDE.LEFT; state.wins[state.winner]++; state.screen = "RESULT"; SFX.win(); }
}

function wrapForFont(text, maxWidth) {
  const lines = []; let line = "";
  for (const ch of String(text).split("")) {
    if (ch === "\n") { lines.push(line); line = ""; continue; }
    if (ctx.measureText(line + ch).width > maxWidth && line) { lines.push(line); line = ch; } else line += ch;
  }
  lines.push(line); return lines;
}
function drawFitText(text, box, maxFont, minFont, color, weight) {
  weight = weight || "bold";
  for (let fs = maxFont; fs >= minFont; fs--) {
    ctx.font = weight + " " + fs + "px sans-serif";
    const lines = wrapForFont(text, box.w), lh = fs * 1.22;
    if (lines.length * lh <= box.h || fs === minFont) {
      ctx.fillStyle = color; ctx.textAlign = "center"; ctx.textBaseline = "middle";
      const startY = box.y + box.h / 2 - (lines.length - 1) * lh / 2;
      lines.forEach((l, i) => ctx.fillText(l, box.x + box.w / 2, startY + i * lh));
      ctx.textBaseline = "alphabetic"; return;
    }
  }
}
